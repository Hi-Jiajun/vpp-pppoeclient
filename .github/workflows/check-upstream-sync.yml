name: Check Upstream Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"
  pull_request:
    paths:
      - "src/plugins/pppoeclient/**"
      - "src/plugins/pppox/**"
      - "scripts/sync-from-upstream.*"
      - ".github/workflows/check-upstream-sync.yml"
  push:
    branches:
      - master
    paths:
      - "src/plugins/pppoeclient/**"
      - "src/plugins/pppox/**"
      - "scripts/sync-from-upstream.*"
      - ".github/workflows/check-upstream-sync.yml"

jobs:
  upstream-sync-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify plugin directories match upstream
        run: |
          chmod +x scripts/sync-from-upstream.sh
          ./scripts/sync-from-upstream.sh --check
