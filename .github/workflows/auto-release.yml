name: Auto Release

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "src/plugins/pppoeclient/**"
      - "src/plugins/pppox/**"
      - "README.md"
      - "README_EN.md"
      - "scripts/**"

permissions:
  contents: write

concurrency:
  group: auto-release-master
  cancel-in-progress: false

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          release_tag="auto-${short_sha}"
          release_title="Auto Release ${short_sha}"
          release_date="$(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          {
            echo "tag=${release_tag}"
            echo "title=${release_title}"
            echo "date=${release_date}"
            echo "short_sha=${short_sha}"
          } >> "$GITHUB_OUTPUT"

      - name: Install packaging tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby ruby-dev rpm build-essential zip
          sudo gem install --no-document fpm

      - name: Build release assets
        shell: bash
        run: |
          chmod +x scripts/build-release-packages.sh
          ./scripts/build-release-packages.sh \
            --short-sha "${{ steps.meta.outputs.short_sha }}" \
            --full-sha "${GITHUB_SHA}" \
            --upstream-branch "feat/pr-pppoeclient" \
            --output-dir "dist"
          ls -lh dist

      - name: Check whether release already exists
        id: exists
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.exists.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            --target "${GITHUB_SHA}" \
            --title "${{ steps.meta.outputs.title }}" \
            --notes "Automated release created from commit ${GITHUB_SHA} on ${{ steps.meta.outputs.date }}." \
            --generate-notes \
            dist/*.zip dist/*.deb dist/*.rpm

      - name: Upload assets to existing release
        if: steps.exists.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ steps.meta.outputs.tag }}" \
            dist/*.zip dist/*.deb dist/*.rpm \
            --clobber
