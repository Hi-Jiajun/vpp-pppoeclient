name: Auto Release

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "src/plugins/pppoeclient/**"
      - "src/plugins/pppox/**"
      - "README.md"
      - "README_CN.md"
      - "README_EN.md"
      - "scripts/**"

permissions:
  contents: write

concurrency:
  group: auto-release-master
  cancel-in-progress: false

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          release_tag="auto-${short_sha}"
          release_title="Auto Release ${short_sha}"
          release_date="$(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          asset_name="vpp-pppoeclient-${short_sha}.zip"
          {
            echo "tag=${release_tag}"
            echo "title=${release_title}"
            echo "date=${release_date}"
            echo "asset_name=${asset_name}"
          } >> "$GITHUB_OUTPUT"

      - name: Build release zip
        shell: bash
        run: |
          mkdir -p dist
          package_root="dist/package"
          mkdir -p "${package_root}/src/plugins"

          cp -R src/plugins/pppoeclient "${package_root}/src/plugins/"
          cp -R src/plugins/pppox "${package_root}/src/plugins/"
          cp LICENSE "${package_root}/"

          cat > "${package_root}/README.md" <<EOF
          # VPP PPPoE Client Release Package

          This package contains only the files needed to integrate the PPPoE client plugins into a VPP source tree:

          - src/plugins/pppoeclient
          - src/plugins/pppox
          - LICENSE

          Source repository:
          - https://github.com/Hi-Jiajun/vpp-pppoeclient

          Source commit:
          - ${GITHUB_SHA}

          Upstream branch:
          - feat/pr-pppoeclient

          Usage:
          1. Copy \`src/plugins/pppoeclient\` into your VPP source tree under \`src/plugins/\`
          2. Copy \`src/plugins/pppox\` into your VPP source tree under \`src/plugins/\`
          3. Build the plugins in your VPP tree, for example:

             \`\`\`bash
             ninja -C build-root/build-vpp-native/vpp pppox_plugin pppoeclient_plugin vpp vppctl
             \`\`\`

          Notes:
          - This zip intentionally excludes repository automation files and documentation not required for VPP integration
          - For full documentation, see the repository README on GitHub
          EOF

          (
            cd "${package_root}"
            zip -qr "../${{ steps.meta.outputs.asset_name }}" .
          )

      - name: Check whether release already exists
        id: exists
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.exists.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            --target "${GITHUB_SHA}" \
            --title "${{ steps.meta.outputs.title }}" \
            --notes "Automated release created from commit ${GITHUB_SHA} on ${{ steps.meta.outputs.date }}." \
            --generate-notes \
            "dist/${{ steps.meta.outputs.asset_name }}"

      - name: Upload zip to existing release
        if: steps.exists.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ steps.meta.outputs.tag }}" \
            "dist/${{ steps.meta.outputs.asset_name }}" \
            --clobber
