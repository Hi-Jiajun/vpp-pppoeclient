name: Auto Release

on:
  workflow_dispatch:
    inputs:
      vpp_ref:
        description: Stable VPP tag from official FDio/vpp used for prebuilt packages
        required: false
        default: ""
  push:
    branches:
      - master
    paths:
      - "src/plugins/pppoeclient/**"
      - "src/plugins/pppox/**"
      - "README.md"
      - "README_EN.md"
      - "scripts/**"
      - ".github/workflows/auto-release.yml"

permissions:
  contents: write

concurrency:
  group: auto-release-master
  cancel-in-progress: false

env:
  VPP_UPSTREAM_URL: https://github.com/FDio/vpp.git

jobs:
  build-prebuilt-packages:
    name: Build ${{ matrix.distro_id }} ${{ matrix.package_type }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro_id: ubuntu24.04
            container_image: ubuntu:24.04
            package_type: deb
            package_arch: amd64
            plugin_lib_dir: /usr/lib/x86_64-linux-gnu/vpp_plugins
            make_os_id: ""
            make_os_version_id: ""
            bootstrap_cmd: |
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y \
                git ca-certificates ruby ruby-dev build-essential rsync
          - distro_id: debian12
            container_image: debian:12
            package_type: deb
            package_arch: amd64
            plugin_lib_dir: /usr/lib/x86_64-linux-gnu/vpp_plugins
            make_os_id: ""
            make_os_version_id: ""
            bootstrap_cmd: |
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y \
                git ca-certificates ruby ruby-dev build-essential rsync
          - distro_id: fedora43
            container_image: fedora:43
            package_type: rpm
            package_arch: x86_64
            plugin_lib_dir: /usr/lib64/vpp_plugins
            make_os_id: fedora
            make_os_version_id: "43"
            skip_install_dep: "false"
            bootstrap_cmd: |
              dnf install -y \
                dnf5-plugins \
                git ca-certificates ruby ruby-devel gcc gcc-c++ make \
                which findutils rsync
          - distro_id: rockylinux9
            container_image: rockylinux:9
            package_type: rpm
            package_arch: x86_64
            plugin_lib_dir: /usr/lib64/vpp_plugins
            make_os_id: ""
            make_os_version_id: ""
            skip_install_dep: "false"
            bootstrap_cmd: |
              dnf install -y \
                git ca-certificates ruby ruby-devel gcc gcc-c++ make \
                which findutils rsync
          - distro_id: rhel9
            container_image: rockylinux:9
            package_type: rpm
            package_arch: x86_64
            plugin_lib_dir: /usr/lib64/vpp_plugins
            make_os_id: ""
            make_os_version_id: ""
            skip_install_dep: "false"
            bootstrap_cmd: |
              dnf install -y \
                git ca-certificates ruby ruby-devel gcc gcc-c++ make \
                which findutils rsync
    container:
      image: ${{ matrix.container_image }}
      options: --user root

    steps:
      - name: Bootstrap container tools
        shell: bash
        run: ${{ matrix.bootstrap_cmd }}

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install packaging tools
        shell: bash
        run: |
          gem install --no-document fpm

      - name: Prepare metadata
        id: meta
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.vpp_ref }}" ]]; then
            vpp_ref="${{ inputs.vpp_ref }}"
          else
            chmod +x scripts/get-latest-fdio-stable-tag.sh
            vpp_ref="$(./scripts/get-latest-fdio-stable-tag.sh "${VPP_UPSTREAM_URL}")"
          fi
          {
            echo "short_sha=${short_sha}"
            echo "vpp_ref=${vpp_ref}"
          } >> "$GITHUB_OUTPUT"

      - name: Build precompiled package
        shell: bash
        run: |
          extra_args=()
          if [[ "${{ matrix.skip_install_dep }}" == "true" ]]; then
            extra_args+=(--skip-install-dep)
          fi
          chmod +x scripts/build-binary-packages.sh
          ./scripts/build-binary-packages.sh \
            --vpp-repo-url "${VPP_UPSTREAM_URL}" \
            --vpp-ref "${{ steps.meta.outputs.vpp_ref }}" \
            --package-type "${{ matrix.package_type }}" \
            --package-arch "${{ matrix.package_arch }}" \
            --distro-id "${{ matrix.distro_id }}" \
            --plugin-lib-dir "${{ matrix.plugin_lib_dir }}" \
            --make-os-id "${{ matrix.make_os_id }}" \
            --make-os-version-id "${{ matrix.make_os_version_id }}" \
            "${extra_args[@]}" \
            --output-dir dist \
            --short-sha "${{ steps.meta.outputs.short_sha }}" \
            --full-sha "${GITHUB_SHA}"
          ls -lh dist

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: prebuilt-${{ matrix.distro_id }}
          path: dist/*

  create-release:
    name: Publish release
    needs: build-prebuilt-packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          short_sha="${GITHUB_SHA::7}"
          release_date="$(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.vpp_ref }}" ]]; then
            vpp_ref="${{ inputs.vpp_ref }}"
          else
            chmod +x scripts/get-latest-fdio-stable-tag.sh
            vpp_ref="$(./scripts/get-latest-fdio-stable-tag.sh "${VPP_UPSTREAM_URL}")"
          fi
          vpp_ref_sanitized="$(echo "${vpp_ref}" | sed 's/[^A-Za-z0-9._-]/-/g')"
          release_tag="fdio-vpp-${vpp_ref_sanitized}-${short_sha}"
          release_title="FDio/vpp ${vpp_ref} Prebuilt Packages (${short_sha})"
          {
            echo "tag=${release_tag}"
            echo "title=${release_title}"
            echo "date=${release_date}"
            echo "vpp_ref=${vpp_ref}"
          } >> "$GITHUB_OUTPUT"

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Check whether release already exists
        id: exists
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.exists.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            --target "${GITHUB_SHA}" \
            --title "${{ steps.meta.outputs.title }}" \
            --notes "Automated prebuilt plugin packages created from commit ${GITHUB_SHA} against VPP ref ${{ steps.meta.outputs.vpp_ref }} on ${{ steps.meta.outputs.date }}." \
            --generate-notes \
            dist/*.deb dist/*.rpm

      - name: Upload assets to existing release
        if: steps.exists.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "${{ steps.meta.outputs.tag }}" \
            dist/*.deb dist/*.rpm \
            --clobber
